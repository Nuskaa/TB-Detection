<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TB Detection</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.4rem;
      color: #00cfff;
      text-align: center;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 2rem;
      text-align: center;
      font-size: 0.95rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 560px;
    }

    .drop-zone {
      border: 2px dashed #333;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 1.2rem;
    }

    .drop-zone:hover { border-color: #00cfff; }

    .drop-zone img {
      max-width: 100%;
      max-height: 280px;
      border-radius: 8px;
      display: none;
      margin: 0 auto;
    }

    .drop-zone .placeholder {
      color: #555;
      font-size: 0.95rem;
    }

    input[type="file"] { display: none; }

    .filename {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.5rem;
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.9rem;
      background: #00cfff;
      color: #000;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover { background: #00aadd; }
    button[type="submit"]:disabled { background: #444; color: #888; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      padding: 1rem 1.4rem;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
    }

    .result-normal {
      background: #0f2d1a;
      border: 1px solid #1a5c30;
      color: #4caf82;
    }

    .result-tb {
      background: #2d0f0f;
      border: 1px solid #5c1a1a;
      color: #e57373;
    }

    .loading {
      display: none;
      text-align: center;
      color: #888;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>🫁 TB Detection</h1>
  <p class="subtitle">Upload a chest X-ray to detect Tuberculosis</p>

  <div class="card">
    <!-- KEY FIX: action="/predict" method="POST" enctype="multipart/form-data"
         This submits directly to Flask — no JavaScript fetch needed -->
    <form action="/predict" method="POST" enctype="multipart/form-data" id="uploadForm">

      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <img id="preview" src="" alt="Preview"/>
        <div class="placeholder" id="placeholder">
          📁 Click to upload X-ray image<br>
          <small>PNG, JPG, JPEG supported</small>
        </div>
      </div>

      <input type="file" id="fileInput" name="file" accept="image/*" required>
      <div class="filename" id="fileName"></div>

      <br>
      <button type="submit" id="submitBtn">Analyse X-Ray →</button>
      <div class="loading" id="loading">⏳ Analysing... please wait</div>
    </form>

    {% if result %}
      <div class="result-box {% if 'TB' in result %}result-tb{% else %}result-normal{% endif %}">
        {% if 'TB' in result %}
          ⚠️ Result: {{ result }}
        {% else %}
          ✅ Result: {{ result }}
        {% endif %}
      </div>
    {% endif %}
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const preview   = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const fileName  = document.getElementById('fileName');
    const form      = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading   = document.getElementById('loading');

    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (!file) return;
      fileName.textContent = file.name;
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        placeholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener('submit', function () {
      submitBtn.disabled = true;
      submitBtn.textContent = 'Analysing...';
      loading.style.display = 'block';
    });
  </script>

</body>
</html>
